name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
            OUTPUT: napcat_monitor_linux
          - os: windows-latest
            GOOS: windows
            GOARCH: amd64
            OUTPUT: napcat_monitor_windows.exe
          - os: macos-latest
            GOOS: darwin
            GOARCH: amd64
            OUTPUT: napcat_monitor_macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
        run: go build -ldflags="-s -w" -o ${{ matrix.OUTPUT }} .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.OUTPUT }}
          path: ${{ matrix.OUTPUT }}
